<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Metropolica — Construye y gestiona tu ciudad viva con zonas, calles, parques y ciudadanos animados.">
  <title>Metropolica — Ciudad Viva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
<div id="game-root">

  <!-- MAIN GAME CANVAS -->
  <canvas id="city-canvas" tabindex="0" aria-label="Mapa interactivo de la ciudad"></canvas>

  <!-- HUD LAYER -->
  <div id="hud">

    <!-- Top status bar -->
    <header id="hud-top">
      <div id="city-brand">🏙️ <span>Metropolica</span></div>
      <div class="hud-sep"></div>
      <div class="hud-stat">
        <span class="hud-label">DÍA</span>
        <span class="hud-value" id="current-day">0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">TESORO</span>
        <span class="hud-value accent-green" id="city-treasury">$50,000</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">APROBACIÓN</span>
        <span class="hud-value" id="city-approval">0%</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">POBLACIÓN</span>
        <span class="hud-value" id="active-citizens-count">0</span>
      </div>
      <div class="hud-sep"></div>
      <div id="game-status" class="status-badge running">Activa</div>
      <div class="hud-sep"></div>
      <div class="hud-top-actions">
        <button class="hud-icon-btn" id="btn-adv1"  title="Avanzar 1 día">+1d</button>
        <button class="hud-icon-btn" id="btn-adv7"  title="Avanzar 7 días">+7d</button>
        <button class="hud-icon-btn" id="btn-adv30" title="Avanzar 30 días">+30d</button>
        <div class="hud-sep"></div>
        <button class="hud-icon-btn" id="btn-reset"       title="Reiniciar">↺</button>
        <button class="hud-icon-btn" id="btn-press-open"  title="Conferencia de Prensa" onclick="openPressModal()">📢</button>
      </div>
    </header>

    <!-- Left tool sidebar -->
    <div id="toolbar-container"></div>

    <!-- Zoom controls -->
    <div id="hud-zoom">
      <button class="zoom-btn" id="btn-zoom-in"  onclick="zoomIn()"  title="Ampliar (+)">+</button>
      <span   id="zoom-label">100%</span>
      <button class="zoom-btn" id="btn-zoom-out" onclick="zoomOut()" title="Reducir (-)">−</button>
    </div>

    <!-- Corruption strip (top-right) -->
    <div id="corruption-strip">
      <span class="corr-label">CORRUPCIÓN</span>
      <div class="corr-track"><div class="corr-fill" id="corruption-bar" style="width:0%"></div></div>
      <span class="corr-val" id="corruption-val">0%</span>
    </div>

    <!-- Tile inspector (bottom-right) -->
    <div id="hud-tile-inspector" hidden>
      <div class="inspector-hdr">
        <span id="inspector-title">Tile</span>
        <button class="insp-close-btn" onclick="closeInspector()">✕</button>
      </div>
      <div id="inspector-body"></div>
      <div id="inspector-actions"></div>
    </div>

    <!-- Bottom slide-up dashboard -->
    <div id="dashboard-container"></div>

  </div><!-- /#hud -->

  <!-- Press Conference Modal -->
  <div id="press-modal" class="overlay-modal">
    <div class="overlay-backdrop" onclick="closePressModal()"></div>
    <div class="overlay-card">
      <div class="overlay-hdr">
        <h2>📢 Conferencia de Prensa</h2>
        <button class="close-btn" onclick="closePressModal()">✕</button>
      </div>
      <div class="overlay-body">
        <label class="form-label">Tema</label>
        <select id="press-topic" class="game-select">
          <option value="infrastructure">Infraestructura</option>
          <option value="security">Seguridad</option>
          <option value="economy">Economía</option>
          <option value="environment">Medio Ambiente</option>
        </select>
        <label class="form-label" style="margin-top:12px">Mensaje</label>
        <textarea id="press-message" class="game-textarea" rows="3" placeholder="Escribe tu mensaje público..."></textarea>
        <button class="ctrl-btn primary" style="margin-top:12px;width:100%" id="btn-press">📢 Publicar</button>
      </div>
    </div>
  </div>

  <!-- Citizen Profile Modal -->
  <div id="profile-modal" class="overlay-modal">
    <div class="overlay-backdrop" onclick="closeModal()"></div>
    <div class="overlay-card modal-wide">
      <div class="overlay-hdr">
        <div>
          <h2 id="m-citizen-id">—</h2>
          <p class="modal-sub" id="m-occupation-header">—</p>
        </div>
        <button class="close-btn" id="btn-close-modal" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-cols">
        <div class="modal-col">
          <div class="modal-section-title">Perfil</div>
          <div class="modal-stat-row"><span>Edad</span><strong id="m-age">—</strong></div>
          <div class="modal-stat-row"><span>Ocupación</span><strong id="m-occupation">—</strong></div>
          <div class="modal-stat-row"><span>Educación</span><strong id="m-education">—</strong></div>
          <div class="modal-stat-row"><span>Región</span><strong id="m-region">—</strong></div>
          <div class="modal-stat-row"><span>Nivel Sim.</span><strong id="m-simulation-level">—</strong></div>
          <div class="modal-stat-row"><span>Causa Activa</span><strong id="m-activation-cause">—</strong></div>
          <div class="modal-stat-row"><span>Problema</span><strong id="m-current-problem">—</strong></div>
          <div class="modal-stat-row" id="m-trigger-row" style="display:none">
            <span>Detonante</span><strong id="m-trigger-detail">—</strong>
          </div>
        </div>
        <div class="modal-col">
          <div class="modal-section-title">Habilidades</div>
          <div id="modal-skills-grid"></div>
          <div class="modal-section-title" style="margin-top:10px">Aspiraciones</div>
          <div id="modal-aspiration-grid"></div>
        </div>
        <div class="modal-col">
          <div class="modal-section-title">Rasgos</div>
          <div id="modal-traits-grid"></div>
        </div>
      </div>
      <div class="overlay-footer">
        <button class="ctrl-btn primary" id="inspect-action-btn">🔍 Activar Inspección</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

</div><!-- /#game-root -->
                    
                              
                                                    <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/map.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/pedestrians.js"></script>
  <script src="js/vehicles.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/render_bridge.js"></script>
  <script src="js/render_1.js"></script>
  <script src="js/render_2.js"></script>
  <script src="js/render_3.js"></script>
  <script src="js/render_4.js"></script>
  <script src="js/ui_1.js"></script>
  <script src="js/ui_2.js"></script>
  <script src="js/ui_3.js"></script>
  <script src="js/ui_4.js"></script>
  <script src="js/input_1.js"></script>
  <script src="js/input_2.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
