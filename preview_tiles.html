<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Metropolica — Catálogo interactivo de assets visuales Canvas 2D puro.">
  <title>Metropolica — Catálogo de Assets Visuales Canvas 2D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/preview.css">
</head>
<body>

  <!-- HEADER -->
  <header class="preview-hdr">
    <div class="hdr-title">
      <h1>🏙️ Metropolica — Catálogo de Assets Canvas 2D</h1>
      <p id="catalog-count">Cargando assets...</p>
    </div>
    <div class="hdr-controls">
      <input type="search" id="search-input" class="search-input" placeholder="🔍 Buscar asset..." aria-label="Buscar asset">
      <button class="ctrl-btn" id="btn-night">🌙 Modo Noche</button>
      <button class="ctrl-btn" id="btn-pause">⏸ Pausar</button>
    </div>
  </header>

  <!-- CATEGORY FILTER NAV -->
  <nav class="cat-filters" aria-label="Filtros de categoría">
    <button class="cat-chip active" data-cat="todos">Todos</button>
    <button class="cat-chip" data-cat="terreno">Terreno</button>
    <button class="cat-chip" data-cat="zonas">Zonas</button>
    <button class="cat-chip" data-cat="edificios">Edificios</button>
    <button class="cat-chip" data-cat="servicios">Servicios</button>
    <button class="cat-chip" data-cat="civicos">Cívicos ★</button>
    <button class="cat-chip" data-cat="vehiculos">Vehículos 🚗</button>
  </nav>

  <!-- TILES GRID -->
  <main class="tiles-grid" id="grid-container"></main>

  <!-- ENGINE DEPENDENCIES -->
  <script src="js/constants.js"></script>
  <script src="js/pedestrians.js"></script>
  <script src="js/vehicles.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/render_bridge.js"></script>
  <script src="js/render_1.js"></script>
  <script src="js/render_2.js"></script>
  <script src="js/render_3.js"></script>
  <script src="js/preview.js"></script>
</body>
</html>
